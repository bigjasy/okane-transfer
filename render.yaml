# OkaneTransfer on Render — PostgreSQL + Docker API + static frontend
# Dashboard: New → Blueprint → connect this repo

databases:
  - name: okane-db
    databaseName: okane_transfer
    user: okane
    plan: free

services:
  - type: web
    name: okane-api
    runtime: docker
    plan: free
    healthCheckPath: /v3/api-docs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: okane-db
          property: connectionString
      - key: AES_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: INIT_DB
        value: "false"
      - key: NOTIFICATION_DEV_EXPOSE_OTP
        value: "false"
      - key: NOTIFICATION_EMAIL_ENABLED
        value: "false"
      # Render free tier blocks SMTP ports 587/465 — use SendGrid HTTP API instead of Gmail SMTP
      - key: MAIL_PROVIDER
        value: sendgrid
      - key: SENDGRID_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      # Must match your static site URL exactly (https, no trailing slash)
      - key: CORS_ALLOWED_ORIGINS
        value: "https://okane-frontend.onrender.com"
      - key: OPENROUTER_API_KEY
        sync: false

  - type: web
    name: okane-frontend
    runtime: static
    buildCommand: npm install && node scripts/render-set-api-url.js && npm run build -- --configuration=render
    staticPublishPath: dist/okane-transfer-frontend/browser
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: API_BASE_URL
        fromService:
          type: web
          name: okane-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
